<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>雾境纪元 · 世界观档案</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400%3B600%3B700&family=ZCOOL+XiaoWei&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f4efe4;--paper:#faf7f0;--ink:#2a1810;--ink-light:#5c3d2e;--gold:#c8922a;--gold-light:#e8c46a;--red:#8b2323;--border:#d4c4a8;--text:#3d2914;--text-dim:#8b7355;--tag-bg:#ede5d0;--shadow:rgba(60,30,10,0.15)}
body{font-family:"Noto Serif SC",serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.8}
header{background:linear-gradient(to bottom,#2a1810,#3d2914);border-bottom:3px solid var(--gold);padding:0;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px var(--shadow)}
.header-inner{max-width:1100px;margin:0 auto;padding:16px 24px;display:flex;justify-content:space-between;align-items:center}
.logo{font-family:"ZCOOL XiaoWei",serif;font-size:1.6em;color:var(--gold-light);letter-spacing:4px}
.btn{padding:8px 22px;border:none;border-radius:4px;cursor:pointer;font-size:0.88em;font-family:inherit;transition:all .2s;letter-spacing:1px}
.btn-primary{background:linear-gradient(135deg,var(--red),#a83232);color:var(--gold-light);border:1px solid var(--gold);box-shadow:0 2px 8px rgba(139,35,35,0.3)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(139,35,35,0.4)}
.btn-ghost{background:transparent;border:1px solid var(--gold);color:var(--gold-light)}
.btn-ghost:hover{background:rgba(200,146,42,0.15)}
.container{max-width:1100px;margin:0 auto;padding:30px 24px}
.stats{display:flex;justify-content:center;gap:60px;margin-bottom:28px;padding:18px 40px;background:var(--paper);border:1px solid var(--border);border-radius:8px;box-shadow:inset 0 0 20px rgba(180,140,80,0.08)}
.stat-item{text-align:center}
.stat-num{font-family:"ZCOOL XiaoWei",serif;font-size:2em;color:var(--red);line-height:1.2}
.stat-label{font-size:0.78em;color:var(--text-dim);letter-spacing:2px}
.tag-section{margin-bottom:25px;background:var(--paper);border:1px solid var(--border);border-radius:8px;padding:16px 20px;box-shadow:0 2px 10px var(--shadow)}
.tag-section-label{font-size:0.72em;color:var(--gold);letter-spacing:3px;margin-bottom:10px;padding-left:8px;border-left:3px solid var(--gold)}
.tag-row{display:flex;gap:8px;flex-wrap:wrap;padding:8px 0}
.tag-primary{padding:5px 16px;background:var(--tag-bg);border:1px solid var(--border);border-radius:4px;font-size:0.85em;cursor:pointer;transition:all .2s;color:var(--ink-light)}
.tag-primary:hover{background:var(--gold-light);border-color:var(--gold);color:var(--ink)}
.tag-primary.active{background:linear-gradient(135deg,var(--gold-light),var(--gold));border-color:var(--gold);color:var(--ink);font-weight:600}
.tag-secondary{padding:3px 12px;background:transparent;border:1px solid transparent;border-radius:4px;font-size:0.8em;cursor:pointer;color:var(--text-dim);transition:all .2s}
.tag-secondary:hover{color:var(--red)}
.tag-secondary.active{background:rgba(139,35,35,0.08);border-color:rgba(139,35,35,0.3);color:var(--red)}
.search-box{margin-bottom:28px}
.search-box input{width:100%;padding:14px 20px;background:var(--paper);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.95em;font-family:inherit;outline:none;transition:all .2s}
.search-box input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,146,42,0.15)}
.doc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}
.doc-card{background:var(--paper);border:1px solid var(--border);border-radius:8px;padding:22px 24px;cursor:pointer;transition:all .25s;box-shadow:0 2px 8px var(--shadow);position:relative;overflow:hidden}
.doc-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--red),var(--gold),var(--red));opacity:0;transition:opacity .25s}
.doc-card:hover{transform:translateY(-3px);border-color:var(--gold);box-shadow:0 8px 24px var(--shadow)}
.doc-card:hover::before{opacity:1}
.doc-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;gap:10px}
.doc-title{font-family:"ZCOOL XiaoWei",serif;font-size:1.15em;color:var(--ink);line-height:1.4}
.doc-uid{font-size:0.7em;color:var(--text-dim);font-family:monospace;background:var(--tag-bg);padding:2px 8px;border-radius:3px;border:1px solid var(--border);white-space:nowrap;flex-shrink:0}
.doc-excerpt{color:var(--text-dim);font-size:0.88em;margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;line-height:1.7}
.doc-tags{display:flex;gap:6px;flex-wrap:wrap}
.doc-tag{display:inline-flex;align-items:center;padding:2px 10px;background:rgba(139,35,35,0.06);border:1px solid rgba(139,35,35,0.2);border-radius:4px;font-size:0.75em;color:var(--red)}
.doc-tag .sep{color:var(--text-dim);margin:0 1px}
.doc-meta{margin-top:14px;font-size:0.75em;color:var(--text-dim);display:flex;justify-content:space-between;padding-top:10px;border-top:1px dashed var(--border)}
.doc-anno{background:rgba(200,146,42,0.2);border-bottom:2px solid rgba(200,146,42,0.6);color:#7a1010;cursor:pointer;padding:1px 4px;border-radius:3px;font-weight:600}
.doc-anno:hover{background:rgba(200,146,42,0.35)}
.doc-anno.anno-active{background:rgba(139,35,35,0.3);border-color:rgba(139,35,35,0.8);color:var(--red);outline:2px solid rgba(139,35,35,0.5)}
.anno-popup{position:fixed;background:#faf5e8;border:2px solid var(--gold);border-radius:8px;padding:16px 20px;max-width:420px;min-width:280px;box-shadow:0 8px 30px rgba(60,30,10,0.25);z-index:300;display:none}
.anno-popup.open{display:block!important}
.anno-popup-title{color:var(--gold);font-weight:600;margin-bottom:8px;font-size:0.95em;border-bottom:1px solid var(--border);padding-bottom:6px}
.anno-popup-body{color:var(--ink);font-size:0.88em;line-height:1.8}
.anno-popup-close{position:absolute;top:8px;right:12px;background:none;border:none;color:var(--text-dim);font-size:1.1em;cursor:pointer}
.anno-popup-close:hover{color:var(--ink)}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(30,15,5,0.75);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--paper);border:2px solid var(--gold);border-radius:12px;width:100%;max-width:760px;max-height:90vh;overflow-y:auto;padding:32px 36px;box-shadow:0 20px 60px rgba(30,15,5,0.4)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;padding-bottom:14px;border-bottom:2px solid var(--border)}
.modal-title{font-family:"ZCOOL XiaoWei",serif;font-size:1.4em;color:var(--ink);letter-spacing:3px}
.modal-close{background:none;border:none;color:var(--text-dim);font-size:1.5em;cursor:pointer;padding:4px 8px}
.modal-close:hover{color:var(--ink)}
.modal-body{color:var(--ink-light);line-height:2;white-space:pre-wrap;font-size:0.95em}
.modal-tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.empty{text-align:center;padding:80px 20px;color:var(--text-dim)}
.empty-icon{font-size:3em;margin-bottom:15px}
.form-group{margin-bottom:20px}
.form-group label{display:block;margin-bottom:8px;font-size:0.85em;color:var(--ink-light);letter-spacing:1px;border-left:3px solid var(--gold);padding-left:8px}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:12px 16px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:0.95em;font-family:inherit;outline:none;transition:all .2s}
.form-group input:focus,.form-group textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,146,42,0.12)}
.form-group textarea{min-height:200px;resize:vertical}
.tag-selector{display:flex;gap:8px}
.tag-selector select{flex:1}
.tag-add-btn{padding:10px 18px;background:var(--tag-bg);border:1px solid var(--border);border-radius:6px;color:var(--ink);cursor:pointer;font-size:0.88em;font-family:inherit;white-space:nowrap;transition:all .2s}
.tag-add-btn:hover{background:var(--gold-light);border-color:var(--gold)}
.selected-tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.selected-tag{display:inline-flex;align-items:center;padding:4px 12px;background:rgba(200,146,42,0.1);border:1px solid rgba(200,146,42,0.4);border-radius:4px;font-size:0.82em;color:#7a4a10;cursor:pointer}
.selected-tag:hover{background:rgba(200,146,42,0.2)}
</style>
</head>

<script>
var API="/api/docs";
var docs=[];
var activePrimary=null,activeSecondary=null,currentViewUid=null;
var editTagPairs=[],editAnnotationsArr=[],pendingSelection=null;
var ALL_PRIMARY_TAGS=[];
var TAG_CHILDREN={};
var TAGS_API="/api/tags";
var DEFAULT_TAGS={primary:[],children:{}};
function loadTags(){fetch(TAGS_API).then(function(r){return r.ok?r.json():null})["catch"](function(){return null}).then(function(t){if(t&&t.primary&&t.primary.length>0){ALL_PRIMARY_TAGS=t.primary||[];TAG_CHILDREN=t.children||{}}else{ALL_PRIMARY_TAGS=DEFAULT_TAGS.primary.slice();TAG_CHILDREN=JSON.parse(JSON.stringify(DEFAULT_TAGS.children));saveTags()}buildTagOptions();loadDocs()})}
function saveTags(){fetch(TAGS_API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({primary:ALL_PRIMARY_TAGS,children:TAG_CHILDREN})})["catch"](function(){})}
function loadDocs(){fetch(API).then(function(r){return r.ok?r.json():getInitialDocs()}).then(function(d){docs=d;render()})["catch"](function(){docs=getInitialDocs();render()})}
var editMemory={title:"",body:"",tags:[],annotations:[]};
var editBodyText=""; // 实时保存编辑中的正文内容
function syncEditMemory(){editMemory.title=document.getElementById("editTitle").value.trim();editBodyText=document.getElementById("editBodyWrap").innerHTML||"";editMemory.body=editBodyText;editMemory.tags=editTagPairs.slice();editMemory.annotations=editAnnotationsArr.slice()}
function restoreEditMemory(){if(editMemory.title){document.getElementById("editTitle").value=editMemory.title}if(editMemory.body){document.getElementById("editBodyWrap").innerHTML=editMemory.body;editBodyText=editMemory.body}editTagPairs=editMemory.tags.slice();editAnnotationsArr=editMemory.annotations.slice()}
function getEditBody(){return editBodyText||document.getElementById("editBodyWrap").innerHTML||""}
// 编辑状态自动备份（每2秒）
var editBackupTimer=null;
function startEditBackup(){stopEditBackup();editBackupTimer=setInterval(syncEditMemory,2000)}
function stopEditBackup(){if(editBackupTimer){clearInterval(editBackupTimer);editBackupTimer=null}}
// 编辑过程中手动触发备份（敏感操作前）
function backupNow(){syncEditMemory()}
function getInitialDocs(){return []}
function saveDocs(){fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(docs)})["catch"](function(){})}
function generateUID(){return Math.random().toString(36).substring(2,10)}
function render(){renderStats();renderTagBar();renderDocGrid()}
function renderStats(){var pc={};docs.forEach(function(d){d.tags.forEach(function(t){pc[t[0]]=(pc[t[0]]||0)+1})});document.getElementById("stats").innerHTML="<div class=stat-item><div class=stat-num>"+docs.length+"</div><div class=stat-label>篇文档</div></div><div class=stat-item><div class=stat-num>"+Object.keys(pc).length+"</div><div class=stat-label>个分类</div></div>"}
function renderTagBar(){var pc={},so={};docs.forEach(function(d){d.tags.forEach(function(t){pc[t[0]]=(pc[t[0]]||0)+1;if(!so[t[0]])so[t[0]]=[];so[t[0]].push(t[1])})});var h="<span class='tag-primary "+(activePrimary?"":"active")+"' onclick=selectPrimary(null)>全部</span>";ALL_PRIMARY_TAGS.filter(function(p){return pc[p]}).forEach(function(p){h+="<span class='tag-primary "+(activePrimary===p?"active":"")+"' onclick='selectPrimary(\""+p+"\")'>"+p+" ("+pc[p]+")</span>"});document.getElementById("primaryTagRow").innerHTML=h;if(activePrimary&&so[activePrimary]){document.getElementById("secondaryLabel").style.display="block";var sh="<span class='tag-secondary "+(activeSecondary?"":"active")+"' onclick=selectSecondary(null)>全部 "+activePrimary+"</span>";so[activePrimary].sort().forEach(function(c){sh+="<span class='tag-secondary "+(activeSecondary===c?"active":"")+"' onclick='selectSecondary(\""+c+"\")'>"+c+"</span>"});document.getElementById("secondaryTagRow").innerHTML=sh}else{document.getElementById("secondaryLabel").style.display="none";document.getElementById("secondaryTagRow").innerHTML=""}}
function selectPrimary(p){activePrimary=p;if(!p)activeSecondary=null;render()}
function selectSecondary(c){activeSecondary=c;render()}
function resetFilter(){activePrimary=null;activeSecondary=null;document.getElementById("searchInput").value="";render()}
function stripHtml(html){if(!html)return"";return html.replace(/<[^>]*>/g,"").replace(/&nbsp;/g," ").replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/&amp;/g,"&").trim()}
function renderDocGrid(){var list=docs;var q=document.getElementById("searchInput").value.toLowerCase();if(q)list=list.filter(function(d){return d.title.toLowerCase().indexOf(q)>-1||d.body.toLowerCase().indexOf(q)>-1});if(activePrimary)list=list.filter(function(d){return d.tags.some(function(t){return t[0]===activePrimary&&(!activeSecondary||t[1]===activeSecondary)})});if(list.length===0){document.getElementById("docGrid").innerHTML="";document.getElementById("emptyState").style.display="block";return}document.getElementById("emptyState").style.display="none";var h="";list.forEach(function(d){var exc=stripHtml(d.body).substring(0,100)+(stripHtml(d.body).length>100?"\u2026":"");var th=d.tags.map(function(t){return"<span class=doc-tag>"+t[0]+"<span class=sep> \u2039 </span>"+t[1]+"</span>"}).join("");var ac=d.annotations?d.annotations.length:0;var badge=ac>0?"<span style='color:#ffc832;font-size:0.75em'>\uD83D\uDCCC "+ac+"</span>":"";h+="<div class=doc-card data-uid="+d.uid+"><div class=doc-card-header><div class=doc-title>"+d.title+"</div><div style='display:flex;gap:6px;align-items:center'>"+badge+"<div class=doc-uid>#"+d.uid+"</div></div></div><div class=doc-excerpt>"+exc+"</div><div class=doc-tags>"+th+"</div><div class=doc-meta><span>"+d.created+"</span><span>"+d.tags.length+" 个标签</span></div></div>"});document.getElementById("docGrid").innerHTML=h}
function filterDocs(){renderDocGrid()}
function viewDoc(uid){var d=docs.find(function(x){return x.uid===uid});if(!d)return;currentViewUid=uid;closeAnnoPopup();[].slice.call(document.querySelectorAll(".modal-overlay")).forEach(function(m){m.classList.remove("open")});document.getElementById("viewTitle").textContent=d.title;document.getElementById("viewUid").textContent="文献编号: "+d.uid;document.getElementById("viewBody").innerHTML=renderViewBody(d.body,d.annotations);var ac=d.annotations?d.annotations.length:0;document.getElementById("viewAnnoCount").innerHTML=ac>0?"<span style='color:#ffc832;font-size:0.82em'>\uD83D\uDCCC "+ac+" 处标注</span>":"";document.getElementById("viewTags").innerHTML=d.tags.map(function(t){return"<span class=doc-tag>"+t[0]+"<span class=sep> \u2039 </span>"+t[1]+"</span>"}).join("");openModal("viewModal")}
function isHtmlContent(body){return/<(img|br|table|ul|ol|div|span)[^>]*>/i.test(body)}
function renderViewBody(body,annotations){if(!body)return"";if(isHtmlContent(body)){return renderBodyWithImages(body)}return renderAnnotatedBody(body,annotations)}
function renderAnnotatedBody(body,annotations){var plain=escapeHtml(body).replace(/\n/g,"<br>");if(!annotations||annotations.length===0)return renderBodyWithImages(plain);var sorted=annotations.slice().sort(function(a,b){return a.start-b.start});var r="",lastEnd=0;sorted.forEach(function(a){if(a.start>=a.end||a.start<lastEnd||a.end>body.length)return;r+=plain.substring(lastEnd,a.start);r+="<span class=doc-anno data-id="+a.id+" onclick=\"showAnnoPopup('"+a.id+"',event)\">"+escapeHtml(body.substring(a.start,a.end))+"</span>";lastEnd=a.end});return renderBodyWithImages(r+plain.substring(lastEnd))}
function renderBodyWithImages(html){return html.replace(/<img([^>]*)>/gi,function(match,attrs){return'<img'+attrs+' style="max-width:100%;height:auto;border-radius:6px;margin:8px 0" onload="if(this.scrollWidth>this.parentElement.scrollWidth)this.style.maxWidth=Math.min(this.scrollWidth,this.parentElement.clientWidth)+\'px\'">'});}
function escapeHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function showAnnoPopup(annoId,event){var d=docs.find(function(x){return x.uid===currentViewUid});if(!d||!d.annotations)return;var a=d.annotations.find(function(x){return x.id===annoId});if(!a)return;document.getElementById("annoPopupTitle").textContent="\uD83D\uDCCC "+a.text;document.getElementById("annoPopupBody").textContent=a.note;var pop=document.getElementById("annoPopup");pop.classList.add("open");var rect=event.target.getBoundingClientRect();pop.style.top=(rect.bottom+window.scrollY+8)+"px";pop.style.left=Math.max(10,rect.left+window.scrollX-30)+"px";event.stopPropagation()}
function closeAnnoPopup(){document.getElementById("annoPopup").classList.remove("open")}
function openModal(id){var el=document.getElementById(id);if(el)el.classList.add("open")}
function closeModal(id){var el=document.getElementById(id);if(el){el.classList.remove("open");if(id==="editModal")stopEditBackup()}}
document.addEventListener("keydown",function(e){if(e.key==="Escape"){document.querySelectorAll(".modal-overlay").forEach(function(m){m.classList.remove("open")});closeAnnoPopup()}});
document.addEventListener("click",function(e){if(e.target.classList.contains("modal-overlay"))e.target.classList.remove("open");var card=e.target.closest(".doc-card");if(card){var uid=card.getAttribute("data-uid");if(uid)viewDoc(uid)}});
function buildTagOptions(){var s1=document.getElementById("editTagParentSelect");var s2=document.getElementById("newSecondaryParent");s1.innerHTML=ALL_PRIMARY_TAGS.map(function(t){return"<option value="+t+">"+t+"</option>"}).join("");s2.innerHTML=ALL_PRIMARY_TAGS.map(function(t){return"<option value="+t+">"+t+"</option>"}).join("");updateChildOptions()}
function updateChildOptions(){var p=document.getElementById("editTagParentSelect").value;var cs=TAG_CHILDREN[p]||[];document.getElementById("editTagChildSelect").innerHTML=cs.map(function(t){return"<option value="+t+">"+t+"</option>"}).join("")}
function addTagPair(){var p=document.getElementById("editTagParentSelect").value;var c=document.getElementById("editTagChildSelect").value;if(!editTagPairs.some(function(t){return t[0]===p&&t[1]===c})){editTagPairs.push([p,c]);renderEditTagSelects()}}
function removeTagPair(i){editTagPairs.splice(i,1);renderEditTagSelects()}
function renderEditTagSelects(){document.getElementById("editSelectedTags").innerHTML=editTagPairs.map(function(t,i){return"<span class=selected-tag onclick=removeTagPair("+i+")>"+t[0]+" \u2039 "+t[1]+" \xD7</span>"}).join("")}
function addNewPrimaryTag(){var v=document.getElementById("newPrimaryTag").value.trim();if(!v)return;syncEditMemory();if(ALL_PRIMARY_TAGS.indexOf(v)===-1){ALL_PRIMARY_TAGS.push(v);TAG_CHILDREN[v]=[]}saveTags();buildTagOptions();renderTagBar();restoreEditMemory();renderEditAnnoList();document.getElementById("newPrimaryTag").value=""}
function addNewSecondaryTag(){var p=document.getElementById("newSecondaryParent").value;var v=document.getElementById("newSecondaryTag").value.trim();if(!p||!v)return;syncEditMemory();if(!TAG_CHILDREN[p])TAG_CHILDREN[p]=[];if(TAG_CHILDREN[p].indexOf(v)===-1)TAG_CHILDREN[p].push(v);saveTags();buildTagOptions();renderTagBar();restoreEditMemory();renderEditAnnoList();document.getElementById("newSecondaryTag").value=""}
function openNewDoc(){document.getElementById("docMode").value="new";document.getElementById("docModalTitle").textContent="新建文档";document.getElementById("deleteDocBtn").style.display="none";document.getElementById("editUid").value="";document.getElementById("editTitle").value="";editTagPairs=[];editAnnotationsArr=[];editBodyText="";buildTagOptions();renderEditTagSelects();document.getElementById("editBodyWrap").textContent="";renderEditAnnoList();cancelAddAnnotation();openModal("editModal");startEditBackup()}
function openEditFromView(){var d=docs.find(function(x){return x.uid===currentViewUid});if(!d)return;document.getElementById("docMode").value="edit";document.getElementById("docModalTitle").textContent="编辑文档";document.getElementById("deleteDocBtn").style.display="flex";document.getElementById("editUid").value=d.uid;document.getElementById("editTitle").value=d.title;editTagPairs=d.tags.map(function(t){return t.slice()});editAnnotationsArr=(d.annotations||[]).map(function(a){return Object.assign({},a)});buildTagOptions();renderEditTagSelects();renderEditBodyWithAnnotations(d.body,editAnnotationsArr);renderEditAnnoList();cancelAddAnnotation();closeModal("viewModal");openModal("editModal");startEditBackup()}
function renderEditBodyWithAnnotations(body,annotations){var div=document.getElementById("editBodyWrap");editBodyText=body;if(!annotations||annotations.length===0){div.innerHTML=body;return}var sorted=annotations.slice().sort(function(a,b){return a.start-b.start});var html="",lastEnd=0;sorted.forEach(function(a){if(a.start>=a.end||a.start<lastEnd||a.end>body.length)return;html+=escapeHtml(body.substring(lastEnd,a.start));html+="<span class='doc-anno editable-anno' data-id="+a.id+" title="+escapeHtml(a.note)+" onclick=\"focusAnnotation('"+a.id+"')\">"+escapeHtml(body.substring(a.start,a.end))+"</span>";lastEnd=a.end});html+=escapeHtml(body.substring(lastEnd));div.innerHTML=html.replace(/\n/g,"<br>")}
function focusAnnotation(id){[].slice.call(document.querySelectorAll(".doc-anno.anno-active")).forEach(function(el){el.classList.remove("anno-active")});var span=document.querySelector("#editBodyWrap .doc-anno[data-id="+id+"]");if(span){span.classList.add("anno-active");span.scrollIntoView({behavior:"smooth",block:"center"})}}
function syncAnnoSelection(){var sel=window.getSelection();if(!sel||sel.rangeCount===0||sel.isCollapsed)return;var range=sel.getRangeAt(0);var div=document.getElementById("editBodyWrap");if(!div||!div.contains(range.commonAncestorContainer))return;var text=sel.toString().trim();if(!text)return;var pre=document.createRange();pre.selectNodeContents(div);pre.setEnd(range.startContainer,range.startOffset);var preText=pre.toString();pendingSelection={text:text,start:preText.length,end:preText.length+text.length};document.getElementById("editSelectedText").textContent="\u201C"+text+"\u201D";document.getElementById("editAnnoPanel").style.display="block";document.getElementById("editAnnoNote").value="";document.getElementById("editAnnoNote").focus()}
function confirmAddAnnotation(){if(!pendingSelection){alert("请先在正文中选中要标注的文字");return}var note=document.getElementById("editAnnoNote").value.trim();if(!note){alert("请输入备注内容");return}editAnnotationsArr.push({id:"anno_"+Date.now(),text:pendingSelection.text,start:pendingSelection.start,end:pendingSelection.end,note:note});window.getSelection().removeAllRanges();cancelAddAnnotation();renderEditBodyWithAnnotations(getEditBody(),editAnnotationsArr);renderEditAnnoList()}
function cancelAddAnnotation(){pendingSelection=null;document.getElementById("editAnnoPanel").style.display="none";window.getSelection().removeAllRanges()}
function handleImageUpload(input){if(!input.files||!input.files[0])return;var file=input.files[0];if(!file.type.startsWith("image/")){alert("请选择图片文件");return}document.getElementById("imgUploadStatus").textContent="\u4E0A;&#x4F20;&#x4E2D...";var formData=new FormData();formData.append("file",file);fetch("/api/upload",{method:"POST",body:formData}).then(function(r){return r.json()}).then(function(result){document.getElementById("imgUploadStatus").textContent="";if(result.error){alert(result.error);return}var url=result.url;insertImageAtCursor(url);input.value=""}).catch(function(err){document.getElementById("imgUploadStatus").textContent="";alert("\u4E0A;&#x4F20;&#x5931;&#x8D25;: "+err)})}
function insertImageAtCursor(url){var div=document.getElementById("editBodyWrap");var img='<img src="'+url+'" style="max-width:100%;height:auto;border-radius:6px;margin:8px 0" loading="lazy">';div.focus();var sel=window.getSelection();if(sel&&sel.rangeCount>0){var range=sel.getRangeAt(0);range.collapse(false);var dummy=document.createElement("span");dummy.innerHTML=img;range.insertNode(dummy);range.setStartAfter(dummy);range.setEndAfter(dummy);range.collapse(false);sel.removeAllRanges();sel.addRange(range)}else{var needsBreak=div.textContent.length>0&&!div.innerHTML.endsWith("<br>");if(needsBreak)div.innerHTML+="<br>";div.innerHTML+=img;div.innerHTML+="<br>"}syncEditMemory()}
function removeEditAnnotation(id){backupNow();editAnnotationsArr=editAnnotationsArr.filter(function(a){return a.id!==id});renderEditBodyWithAnnotations(getEditBody(),editAnnotationsArr);renderEditAnnoList()}
function editAnnoNote2(id){backupNow();var a=editAnnotationsArr.find(function(x){return x.id===id});if(!a)return;var n=prompt("修改标注内容：",a.note);if(n!==null&&n.trim())a.note=n.trim();renderEditBodyWithAnnotations(getEditBody(),editAnnotationsArr);renderEditAnnoList()}
function renderEditAnnoList(){document.getElementById("editAnnoCount").textContent=editAnnotationsArr.length;if(editAnnotationsArr.length===0){document.getElementById("editAnnoList").innerHTML="<div style='color:var(--text-dim);font-size:0.85em;text-align:center;padding:20px'>暂无标注<br><span style='font-size:0.85em'>在正文中选中文字后添加</span></div>";return}document.getElementById("editAnnoList").innerHTML=editAnnotationsArr.map(function(a){return"<div style='margin-bottom:8px;padding:10px 14px;background:var(--bg);border-radius:8px;border:1px solid var(--border);cursor:pointer' onclick=focusAnnotation(\""+a.id+"\")><div style='display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px'><span style='color:#ffc832;font-size:0.9em;font-weight:bold'>\u201C"+a.text+"\u201D</span><div style='display:flex;gap:6px;flex-shrink:0' onclick=event.stopPropagation()><button class='btn btn-ghost' style='padding:3px 10px;font-size:0.75em' onclick=editAnnoNote2(\""+a.id+"\")>编辑</button><button class='btn btn-ghost' style='padding:3px 10px;font-size:0.75em;color:#ff6464' onclick=removeEditAnnotation(\""+a.id+"\")>删除</button></div></div><div style='color:var(--text-dim);font-size:0.85em;line-height:1.6'>"+a.note+"</div></div>"}).join("")}
async function saveDoc(){var mode=document.getElementById("docMode").value;var title=document.getElementById("editTitle").value.trim();var bodyDiv=document.getElementById("editBodyWrap");var body=bodyDiv.innerHTML;if(!title){alert("请输入标题");return}stopEditBackup();if(mode==="new"){var doc={uid:generateUID(),title:title,body:body||"<br>",tags:editTagPairs.slice(),annotations:editAnnotationsArr.slice(),created:new Date().toISOString().split("T")[0]};docs.unshift(doc)}else{var uid=document.getElementById("editUid").value;var idx=docs.findIndex(function(x){return x.uid===uid});if(idx!==-1){docs[idx]={uid:uid,title:title,body:body,tags:editTagPairs.slice(),annotations:editAnnotationsArr.slice(),created:docs[idx].created}}}await saveDocs();closeModal("editModal");buildTagOptions();render();if(mode==="edit"&&currentViewUid){viewDoc(currentViewUid);openModal("viewModal")}}
async function deleteDoc(){if(!confirm("确定删除这篇文档？"))return;stopEditBackup();var uid=document.getElementById("editUid").value;docs=docs.filter(function(x){return x.uid!==uid});await saveDocs();closeModal("editModal");currentViewUid=null;buildTagOptions();render()}
document.getElementById("editTagParentSelect").addEventListener("change",updateChildOptions);
document.getElementById("newSecondaryParent").addEventListener("change",updateChildOptions);
loadTags();
</script>
</body>
