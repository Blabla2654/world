<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>废弃文档 - 世界观档案</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>🗑️ 废弃文档</h1>
            <div class="header-actions">
                <button class="btn" onclick="location.href='./'">← 返回档案</button>
            </div>
        </div>
    </header>
    <main class="container">
        <div class="trash-toolbar">
            <span id="trashCount">废弃文档：0 篇</span>
            <button class="btn danger" id="emptyAllBtn" onclick="emptyTrash()">🗑️ 全部删除</button>
        </div>
        <div id="trashList">
            <p class="loading-tip">加载中...</p>
        </div>
    </main>

    <!-- 查看文档弹窗 -->
    <div id="viewModal" class="modal-overlay" style="display:none;">
        <div class="modal-content doc-view-modal">
            <div class="modal-header">
                <h2 id="viewDocTitle">文档标题</h2>
                <button class="modal-close" onclick="closeView()">×</button>
            </div>
            <div class="modal-body">
                <div id="viewDocBody" class="doc-body"></div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeView()">关闭</button>
            </div>
        </div>
    </div>

    <script src="trash.js"></script>
</body>
</html>
