<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>废弃文档 - 世界观档案</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>🗑️ 废弃文档</h1>

                <button class="btn" onclick="location.href='./'">← 返回档案</button>

    <main class="container">
        <div class="trash-toolbar">
            <span id="trashCount">废弃文档：0 篇</span>

        </div>
        <div id="trashList">
            <p class="loading-tip">加载中...</p>
        </div>
    </main>
    <script src="api_server.py? raw"></script>
    <script src="trash.js"></script>
</body>
</html>
